<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eLearning &middot; Access</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  body { margin: 0; padding: 0 0 40px 0; background-color: transparent; }
  #custom-container-access-01,
  #custom-container-access-01 * { box-sizing: border-box; }
  #custom-container-access-01 {
    font-family: 'Urbanist', sans-serif;
    background-color: #F4F7FA;
    max-width: 880px;
    width: calc(100% - 32px);
    margin: 24px auto;
    border-radius: 8px;
    padding: 28px 32px;
    color: #0F2347;
    border: 1px solid #0F2347;
  }
  .acc01-eyebrow { font-size: 13px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: #CC2229; margin: 0 0 8px; }
  .acc01-title { font-family: 'Urbanist', sans-serif; font-weight: 700; font-size: 26px; color: #1B3A6B; margin: 0 0 6px; line-height: 1.2; }
  .acc01-sub { font-size: 14px; color: rgba(15,35,71,0.78); margin: 0 0 18px; min-height: 1.5em; }
  .acc01-sub strong { color: #1B3A6B; font-weight: 700; }

  .acc01-frame {
    display: block; width: 100%; height: 1240px; border: 1px solid rgba(15,35,71,0.32);
    border-radius: 6px; background: #FFFFFF;
  }

  .acc01-banner { padding: 12px 14px; border-radius: 4px; font-size: 14px; margin-bottom: 14px; display: none; }
  .acc01-banner.is-error { display: block; background: rgba(204,34,41,0.10); color: #CC2229; border: 1px solid rgba(204,34,41,0.32); }
  .acc01-banner.is-warn { display: block; background: rgba(204,34,41,0.10); color: #CC2229; border: 1px solid rgba(204,34,41,0.32); }
  .acc01-banner.is-info { display: block; background: rgba(27,58,107,0.08); color: #1B3A6B; border: 1px solid rgba(27,58,107,0.22); }

  .acc01-loading, .acc01-error, .acc01-empty {
    padding: 36px 16px; text-align: center; border-radius: 6px;
    background: #FFFFFF; color: rgba(15,35,71,0.62); font-size: 14px;
    border: 1px dashed rgba(15,35,71,0.22);
  }
  .acc01-error { border-color: #CC2229; color: #CC2229; background: rgba(204,34,41,0.04); }

  .acc01-error-detail { font-size: 12px; color: rgba(15,35,71,0.5); margin-top: 12px; font-family: 'Menlo', 'Consolas', monospace; word-break: break-all; }
  .acc01-actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }

  .acc01-btn {
    font-size: 13px; font-family: 'Urbanist', sans-serif; font-weight: 600;
    padding: 10px 16px; border-radius: 4px; cursor: pointer;
    text-decoration: none; display: inline-block;
    transition: background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease;
  }
  .acc01-btn.is-primary { background-color: #1B3A6B; color: #FFFFFF; border: 1px solid #1B3A6B; }
  .acc01-btn.is-primary:hover { background-color: #CC2229; border-color: #CC2229; }
  .acc01-btn.is-secondary { background-color: transparent; color: #0F2347; border: 1px solid rgba(15,35,71,0.32); }
  .acc01-btn.is-secondary:hover { background-color: rgba(15,35,71,0.06); border-color: #1B3A6B; }

  .acc01-foot { font-size: 12px; color: rgba(15,35,71,0.55); margin-top: 14px; }

  @media (max-width: 768px) {
    #custom-container-access-01 { width: calc(100% - 24px); padding: 22px 16px; }
    .acc01-title { font-size: 20px; }
    .acc01-frame { height: 1400px; }
  }
</style>
</head>
<body>
<div id="custom-container-access-01" role="region" aria-label="eLearning access">
  <p class="acc01-eyebrow">eLearning Access</p>
  <h2 class="acc01-title" id="acc01-title">Verifying your link…</h2>
  <p class="acc01-sub" id="acc01-sub">One moment.</p>
  <div id="acc01-banner" class="acc01-banner" role="alert"></div>
  <div id="acc01-body"></div>
</div>

<script>
(function(){
  try {
    var root = document.getElementById('custom-container-access-01');
    if (!root) { console.error('[acc01] container missing'); return; }

    var SUPABASE_URL = 'https://axwipqlykysnxudnejvi.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4d2lwcWx5a3lzbnh1ZG5lanZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0ODg2NTcsImV4cCI6MjEwMDA2NDY1N30.uTgP-OfI5NtknLCw_LjvXY3tTKNfKc83DJcFRrvwgb8';
    var TAB_BASE = 'https://jhlburke-code.github.io/eLearning/widgets/';
    var ENROLL_URL = 'https://jhlburke-code.github.io/eLearning/widgets/enroll/';

    var titleEl = root.querySelector('#acc01-title');
    var subEl = root.querySelector('#acc01-sub');
    var banner = root.querySelector('#acc01-banner');
    var body = root.querySelector('#acc01-body');

    function escapeHtml(s){
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function setState(title, sub){
      titleEl.textContent = title;
      subEl.textContent = sub;
    }
    function setBanner(text, kind){
      banner.textContent = text;
      banner.className = 'acc01-banner ' + (kind === 'error' ? 'is-error' : (kind === 'warn' ? 'is-warn' : 'is-info'));
    }
    function clearBanner(){
      banner.textContent = '';
      banner.className = 'acc01-banner';
    }
    function setError(msg, detail){
      setState('Access link not valid', 'We could not verify this link. Re-enroll to receive a fresh one.');
      setBanner(msg, 'error');
      var html = '<div class="acc01-error">' + escapeHtml(msg) + '</div>';
      if (detail) html += '<div class="acc01-error-detail">' + escapeHtml(detail) + '</div>';
      html += '<div class="acc01-actions"><a class="acc01-btn is-secondary" href="' + ENROLL_URL + '" target="_top">Enroll again &rarr;</a></div>';
      body.innerHTML = html;
    }
    function setDeviceMismatch(email){
      setState('Wrong device for this link', 'This access link was first used on a different device. To continue on this one, request a fresh link to this email.');
      setBanner('Device mismatch — link is bound to a different device', 'warn');
      body.innerHTML =
        '<p class="acc01-error" style="background:rgba(204,34,41,0.04);color:#CC2229;border:1px solid rgba(204,34,41,0.32);padding:18px;border-radius:6px;margin:0 0 14px;">' +
          '<strong style="display:block;font-size:14px;margin-bottom:6px;">This link was used on another device.</strong>' +
          'The unique access link tied to <strong>' + escapeHtml(email) + '</strong> was first opened on a different device and is now device-bound to that one. Don\'t worry — this is a security feature, not a bug.' +
        '</p>' +
        '<p style="font-size:14px;color:rgba(15,35,71,0.78);margin:0 0 6px;"><strong>Two ways to fix this:</strong></p>' +
        '<ol style="font-size:14px;color:rgba(15,35,71,0.78);margin:0 0 14px;padding-left:22px;">' +
          '<li>Switch back to the original device and click the link from your email there.</li>' +
          '<li>Re-enroll from this device — we\'ll send a fresh link tied to this browser.</li>' +
        '</ol>' +
        '<div class="acc01-actions"><a class="acc01-btn is-primary" href="' + ENROLL_URL + '" target="_top">Re-enroll on this device</a></div>';
    }

    function getToken() {
      try {
        var u = new URL(window.location.href);
        var t = u.searchParams.get('token');
        if (t) return t.trim();
      } catch (_) {}
      try {
        var h = window.location.hash.replace(/^#/, '');
        var parts = h.split('&');
        for (var i = 0; i < parts.length; i++) {
          var kv = parts[i].split('=');
          if (decodeURIComponent(kv[0]) === 'token' && kv[1]) return decodeURIComponent(kv[1]).trim();
        }
      } catch (_) {}
      var href = window.location.href;
      var m = href.match(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i);
      if (m) return m[0];
      return null;
    }

    // Lightweight, sync, fingerprint. Not crypto-strong — just stable enough
    // to tell two devices apart. No persistence in localStorage / cookies.
    function fingerprint() {
      var nav = window.navigator || {};
      var scr = window.screen || {};
      var parts = [
        nav.userAgent || '',
        nav.language || '',
        Array.isArray(nav.languages) ? nav.languages.slice(0,2).join(',') : '',
        (scr.width||0) + 'x' + (scr.height||0) + 'x' + (scr.colorDepth||0),
        (scr.availWidth||0) + 'x' + (scr.availHeight||0),
        scr.pixelDepth || '',
        new Date().getTimezoneOffset(),
        String(nav.hardwareConcurrency || ''),
        String(nav.maxTouchPoints || ''),
        nav.platform || '',
        nav.vendor || ''
      ];
      var s = parts.join('|');
      // Hash to keep it short + opaque
      var h = 5381;
      for (var i = 0; i < s.length; i++) { h = ((h << 5) + h) ^ s.charCodeAt(i); }
      return ('fp_' + (h >>> 0).toString(16));
    }

    function widgetUrlFor(moduleSlug) {
      var key = (moduleSlug || '').split('/')[0];
      return TAB_BASE + encodeURIComponent(key) + '/';
    }

    function verifyToken(token, fp) {
      return fetch(SUPABASE_URL + '/rest/v1/rpc/verify_access_token', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ p_token: token, p_fingerprint: fp })
      }).then(function(r){
        return r.text().then(function(text){
          return { status: r.status, ok: r.ok, body: text };
        });
      });
    }

    function showModule(email, moduleSlug) {
      setState('Welcome back, ' + email + '.',
               'You\'re enrolled in ' + moduleSlug + ' · device-bound · valid for 7 days from issue.');
      clearBanner();
      var baseUrl = widgetUrlFor(moduleSlug);
      // Cache-bust the inner iframe URL with the token so a stale CDN-cached
      // version of the inner widget can't survive between sessions.
      var currentToken = (typeof getToken === 'function' ? getToken() : null) || Date.now().toString(36);
      var url = baseUrl + '?_=' + encodeURIComponent(currentToken);
      body.innerHTML =
        '<iframe class="acc01-frame" id="acc01-frame" title="eLearning content" src="' + escapeHtml(url) + '" allow="fullscreen" referrerpolicy="no-referrer"></iframe>' +
        '<p class="acc01-foot">Signed in as <strong>' + escapeHtml(email) + '</strong> on this device. Closing this tab or sharing the link won\'t unlock another device &mdash; only this browser will get through with this token.</p>';
    }

    function recordCompletion(email, module) {
      // Dedupe key — one row per (email, module) per session. Even if the inner
      // widget fires multiple {type:'complete'} (double-click, race condition,
      // sandbox quirk), we only POST once.
      var key = email + '|' + module;
      var alreadyDone = false;
      var listener = function(e){
        try {
          var d = e && e.data;
          if (!d || d.type !== 'complete' || !email) return;
          if (alreadyDone) { console.log('[acc01] dedupe skip'); return; }
          alreadyDone = true;
          fetch(SUPABASE_URL + '/rest/v1/eLearning_completions', {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': 'Bearer ' + SUPABASE_KEY,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ email: email, module: module })
          }).catch(function(err){ console.error('[acc01] completion POST failed', err); });
        } catch (err) { console.error('[acc01] message handler', err); }
      };
      window.addEventListener('message', listener);
    }

    function init() {
      setState('Verifying your link…', 'One moment.');
      body.innerHTML = '<div class="acc01-loading">Checking your access token&hellip;</div>';

      var token = getToken();
      if (!token) {
        setError('No access token found in the URL.',
                 'The link you followed does not contain a token. This can happen if a redirect stripped the query string. Try the email button again, or copy/paste the long URL from the email body.');
        return;
      }

      var fp = fingerprint();
      verifyToken(token, fp).then(function(r){
        if (r.ok) {
          var rows = [];
          try { rows = JSON.parse(r.body); } catch (_) {}
          if (Array.isArray(rows) && rows.length > 0) {
            var row = rows[0];
            var status = row.status || 'ok';
            if (status === 'device-mismatch') {
              setDeviceMismatch(row.email);
              return;
            }
            if (status === 'ok') {
              showModule(row.email, row.module);
              recordCompletion(row.email, row.module);
              return;
            }
            // Unknown status — fall through to error
            setError('Unexpected verification state: ' + status, 'Token: ' + token);
            return;
          }
          setError('This link has expired or is not valid.',
                   'Token: ' + token + ' &middot; RPC status 200 with 0 rows. Re-enroll to receive a fresh link.');
          return;
        }
        if (r.status === 401 || r.status === 403) {
          setError('Could not reach the verification service.',
                   'RPC status ' + r.status + '. This is usually an ad-blocker or extension stripping the apikey header. Try a different network or incognito mode.');
        } else {
          setError('Could not verify the access link (HTTP ' + r.status + ').',
                   'Body: ' + (r.body || '').slice(0, 300));
        }
      }).catch(function(err){
        setError('Network error.', (err && err.message) || 'Could not reach the verification service.');
      });
    }

    init();
  } catch (err) {
    console.error('[acc01]', err);
  }
})();
</script>
</body>
</html>
